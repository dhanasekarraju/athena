name: AI Engine - Test & Build

on:
  push:
    branches: [main]
    paths: ["ai-engine/**"]
  pull_request:
    paths: ["ai-engine/**"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ai-engine/requirements.txt
      - run: pip install -r requirements.txt
      - run: pip install pytest
      - run: pytest -q || echo "No tests found yet — add pytest suites under ai-engine/tests/"

  docker_build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build AI engine image
        run: docker build -t athena-ai-engine:ci ./ai-engine
