plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services" apply false
}

// Firebase is optional until google-services.json is added.
def hasGoogleServices = file("google-services.json").exists()
if (hasGoogleServices) {
    apply plugin: "com.google.gms.google-services"
}

android {
    namespace = "app.athena.trading"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    defaultConfig {
        applicationId = "app.athena.trading"
        minSdk = 24
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            if (System.getenv("ATHENA_KEYSTORE_PATH")) {
                storeFile file(System.getenv("ATHENA_KEYSTORE_PATH"))
                storePassword System.getenv("ATHENA_KEYSTORE_PASSWORD")
                keyAlias System.getenv("ATHENA_KEY_ALIAS")
                keyPassword System.getenv("ATHENA_KEY_PASSWORD")
            }
        }
    }

    buildTypes {
        release {
            signingConfig = System.getenv("ATHENA_KEYSTORE_PATH")
                    ? signingConfigs.release
                    : signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    if (hasGoogleServices) {
        implementation platform("com.google.firebase:firebase-bom:33.1.0")
        implementation "com.google.firebase:firebase-messaging"
    }
}
