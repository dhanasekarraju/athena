def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0.0'

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"
apply plugin: 'com.google.gms.google-services'

android {
    namespace 'app.athena.trading'
    compileSdk 34
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId "app.athena.trading"
        minSdkVersion 24
        targetSdkVersion 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        release {
            // Populate via android/key.properties (gitignored) for production signing.
            // For CI, GitHub Actions injects these from repo secrets — see
            // .github/workflows/mobile-ci.yml
            if (System.getenv("ATHENA_KEYSTORE_PATH")) {
                storeFile file(System.getenv("ATHENA_KEYSTORE_PATH"))
                storePassword System.getenv("ATHENA_KEYSTORE_PASSWORD")
                keyAlias System.getenv("ATHENA_KEY_ALIAS")
                keyPassword System.getenv("ATHENA_KEY_PASSWORD")
            }
        }
    }

    buildTypes {
        release {
            signingConfig = System.getenv("ATHENA_KEYSTORE_PATH") ? signingConfigs.release : signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation platform('com.google.firebase:firebase-bom:33.1.0')
    implementation 'com.google.firebase:firebase-messaging'
}
